<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문서 뷰어 - (주)비에이텍</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
  <style>
    .viewer-container {
      max-width: 1000px;
      margin: 0 auto;
      height: 75vh;
    }
    .pdf-frame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
      box-shadow: var(--water-shadow);
      background-color: var(--text-light);
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const file = urlParams.get('file');
      if (file) {
        document.getElementById('docViewer').src = file;
        document.getElementById('docTitle').textContent = file.replace('.pdf', '');
      } else {
        document.getElementById('docViewer').parentElement.innerHTML = '<p style="text-align:center; padding: 2rem;">파일을 찾을 수 없거나 잘못된 접근입니다.</p>';
      }
    });
  </script>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">B-A-Tech</a>
      </div>
      <ul class="nav-links">
        <li><a href="intro.html">기업소개</a></li>
        <li><a href="product.html">주요제품</a></li>
        <li><a href="equipment.html">장비 및 시설</a></li>
        <li><a href="sales_history.html">업력/실적</a></li>
        <li><a href="map.html">오시는길</a></li>
        <li><a href="content.html">콘텐츠</a></li>
        <li><a href="inquiry.html">문의하기</a></li>
      </ul>
      <div class="hamburger">
        <div class="line1"></div>
        <div class="line2"></div>
        <div class="line3"></div>
      </div>
    </nav>
  </header>
  <main>
    <section class="section fade-in" style="padding-top: 2rem; padding-bottom: 2rem;">
      <h2 class="section-title" id="docTitle">문서 뷰어</h2>
      <div class="viewer-container">
        <iframe id="docViewer" class="pdf-frame" src=""></iframe>
      </div>
      <div style="text-align: center; margin-top: 2rem;">
        <button onclick="history.back()" class="btn-primary">이전 페이지로 돌아가기</button>
      </div>
    </section>
  </main>
  
  <footer>
    <div class="footer-content">
      <div class="footer-col">
        <h3>(주)비에이텍</h3>
        <p>물 그 이상의 가치를 만드는 기술</p>
      </div>
      <div class="footer-col">
        <h3>Contact Info</h3>
        <p>주소: 강원 춘천시 퇴계공단2길 64 (퇴계제2농공단지 내)</p>
        <p>TEL: 033-264-9243</p>
        <p>FAX: 033-251-5747</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 (주)비에이텍 All Rights Reserved.</p>
    </div>
  </footer>
</body>
</html>
